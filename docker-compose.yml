version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: job_portal_postgres
    restart: always
    environment:
      POSTGRES_USER: job_user
      POSTGRES_PASSWORD: job_password
      POSTGRES_DB: job_portal
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
